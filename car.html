<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Hello Kitty小车</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff; 
            overflow: hidden;
            height: 100vh;
        }
        .car {
            width: 300px;
            height: 300px;
            
            background: url('car.png') no-repeat center/contain;
            position: absolute;
            bottom: 50%;
            transform: translateY(50%);
            animation: drive 8s linear infinite;
        }
        @keyframes drive {
            0% {
                transform: translate(50vw, 50%); 
            }
            100% {
                transform: translate(-300px, 50%); 
            }
        }
    </style>
</head>
<body>
    <div class="car"></div>
</body>
</html>
