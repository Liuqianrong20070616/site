<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>3D渐变立方体</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    perspective: 1000px;
  }

  .cube-box {
    width: 200px;
    height: 200px;
    position: relative;
    transform-style: preserve-3d;
    animation: rotate 8s linear infinite;
  }

  @keyframes rotate {
    0%   { transform: rotateX(0deg) rotateY(0deg); }
    100% { transform: rotateX(360deg) rotateY(360deg); }
  }

  .face {
    position: absolute;
    width: 200px;
    height: 200px;
    opacity: 0.85;
    border: 1px solid rgba(255,255,255,0.3);
  }

  .front {
    background: linear-gradient(135deg, #ff2a2a, #2aff2a);
    transform: translateZ(100px) skewX(0deg) skewY(0deg);
  }

  .back {
    background: linear-gradient(45deg, #ff2a2a, #2aff2a);
    transform: translateZ(-100px) rotateY(180deg) skewX(5deg) skewY(2deg);
  }

  .left {
    background: linear-gradient(to top, #ff2a2a, #2aff2a);
    transform: translateX(-100px) rotateY(-90deg) skewX(-3deg) skewY(1deg);
  }

  .right {
    background: linear-gradient(to bottom, #ff2a2a, #2aff2a);
    transform: translateX(100px) rotateY(90deg) skewX(2deg) skewY(-2deg);
  }

  .top {
    background: linear-gradient(to bottom, #ff2a2a, #ff8800);
    transform: translateY(-100px) rotateX(90deg) skewX(1deg) skewY(3deg);
  }

  .bottom {
    background: linear-gradient(to top, #2aff2a, #88ff00);
    transform: translateY(100px) rotateX(-90deg) skewX(-2deg) skewY(-1deg);
  }
</style>
</head>
<body>
<div class="cube-box">
  <div class="face front"></div>
  <div class="face back"></div>
  <div class="face left"></div>
  <div class="face right"></div>
  <div class="face top"></div>
  <div class="face bottom"></div>
</div>
</body>
</html>
